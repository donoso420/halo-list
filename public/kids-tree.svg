<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <circle cx="60" cy="60" r="58" fill="#f0fff4"/>
  <!-- ground -->
  <ellipse cx="60" cy="105" rx="45" ry="8" fill="#a8d090" opacity="0.5"/>
  <!-- trunk -->
  <rect x="52" y="72" width="16" height="36" rx="6" fill="#8b5e2a"/>
  <!-- tree foliage layers -->
  <ellipse cx="60" cy="75" rx="38" ry="20" fill="#4a9e50"/>
  <ellipse cx="60" cy="60" rx="32" ry="22" fill="#5cb868"/>
  <ellipse cx="60" cy="45" rx="24" ry="18" fill="#6cd478"/>
  <ellipse cx="60" cy="32" rx="16" ry="14" fill="#7ee080"/>
  <!-- little person in tree (Zacchaeus) -->
  <circle cx="78" cy="58" r="6" fill="#f5c090"/>
  <rect x="74" y="64" width="8" height="10" rx="3" fill="#e04040"/>
  <!-- arms on branch -->
  <line x1="68" y1="68" x2="74" y2="66" stroke="#8b5e2a" stroke-width="4" stroke-linecap="round"/>
  <line x1="82" y1="66" x2="90" y2="62" stroke="#8b5e2a" stroke-width="4" stroke-linecap="round"/>
  <!-- dots eyes -->
  <circle cx="76" cy="57" r="1.5" fill="#3a2010"/>
  <circle cx="80" cy="57" r="1.5" fill="#3a2010"/>
</svg>
