  <ellipse cx="58" cy="65" rx="36" ry="22" fill="#4a90d9"/>
  <!-- tail fin -->
  <path d="M22 65 L10 52 L10 78 Z" fill="#3a75b8"/>
  <!-- belly -->
  <ellipse cx="62" cy="72" rx="22" ry="10" fill="#7cc0f0"/>
  <!-- eye -->
  <circle cx="82" cy="60" r="5" fill="white"/>
  <circle cx="83" cy="59" r="3" fill="#1a2540"/>
  <circle cx="84" cy="58" r="1" fill="white"/>
  <!-- mouth smile -->
  <path d="M86 64 Q92 70 88 74" stroke="#3a75b8" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <!-- spout -->
  <path d="M72 43 Q74 32 76 28 Q78 32 82 43" stroke="#7cc0f0" stroke-width="3" stroke-linecap="round" fill="none"/>
  <!-- water drops -->
  <circle cx="74" cy="26" r="2.5" fill="#6ab0e0"/>
  <circle cx="80" cy="24" r="2" fill="#6ab0e0"/>
</svg>
